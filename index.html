<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Z&L CARS</title>
  <!-- Fonte moderna do Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <!-- Ícones do Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #f4f4f4;
      text-align: center;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .header {
      width: 100%;
      height: 250px;
      background-color: #25D366;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
    }
    h1, p, .entrecontato {
      opacity: 0;
      animation: fadeSlide 1.5s forwards;
    }
    h1 {
      font-weight: 600;
      animation-delay: 0.3s;
      margin: 0;
    }
    p {
      font-size: 18px;
      animation-delay: 0.8s;
    }
    .entrecontato {
      font-weight: bold;
      margin: 20px 0;
      animation-delay: 1.2s;
    }
    @keyframes fadeSlide {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .buttons-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .whatsapp-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 250px;
      margin: 15px;
      padding: 15px;
      background-color: #25D366;
      color: white;
      font-size: 18px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 8px;
      border: 2px solid #1ebe5d;
      transition: background-color 0.3s ease, transform 0.2s ease;
      opacity: 0;
      animation: fadeSlide 1.5s forwards;
      animation-delay: 1.5s;
    }
    .whatsapp-link i {
      margin-right: 10px;
      font-size: 22px;
    }
    .whatsapp-link:hover {
      background-color: #1ebe5d;
      transform: scale(1.05);
    }
    hr {
      border: none;
      border-top: 2px solid #000;
      width: 80%;
      margin: 20px auto;
      opacity: 0;
      animation: fadeSlide 1.5s forwards;
    }
    hr:first-of-type {
      animation-delay: 1s;
    }
    hr:last-of-type {
      animation-delay: 2s;
    }
    .icons-top, .icons-bottom {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 10px 0;
      font-size: 24px;
      color: black; /* ícones pretos */
    }
    footer {
      background-color: #25D366;
      color: white;
      padding: 20px;
      font-size: 14px;
      font-weight: 500;
      margin-top: auto;
    }
  </style>
</head>
<body>
  <!-- Header faixa verde menor -->
  <div class="header">
    <h1>Seja bem vindo à<br> Z&L CARS 🚗</h1>
    <p>Confiança e qualidade sobre rodas.</p>
  </div>

  <hr>

  <!-- Ícones acima da barrinha -->
  <div class="icons-top">
    <i class="fas fa-car"></i>
    <i class="fas fa-car-side"></i>
    <i class="fas fa-circle"></i>
    <i class="fas fa-circle"></i>
  </div>
  
  <p class="entrecontato">Entre em contato</p>

  <!-- Botões centralizados com mensagens automáticas -->
  <div class="buttons-container">
    <a class="whatsapp-link" href="https://wa.me/5544997555905?text=Olá%20tudo%20bem?%0AQuais%20veículos%20vocês%20têm%20disponíveis%20no%20momento?" target="_blank">
      <i class="fab fa-whatsapp"></i> Matheus
    </a>
    <a class="whatsapp-link" href="https://wa.me/5544998087778?text=Olá%20tudo%20bem?%0AQuais%20veículos%20vocês%20têm%20disponíveis%20no%20momento?" target="_blank">
      <i class="fab fa-whatsapp"></i> Lourival
    </a>
    <a class="whatsapp-link" href="https://wa.me/5544999866631?text=Olá%20tudo%20bem?%0AQuais%20veículos%20vocês%20têm%20disponíveis%20no%20momento?" target="_blank">
      <i class="fab fa-whatsapp"></i> Luiz
    </a>
  </div>

  <!-- Ícones abaixo da barrinha -->
  <div class="icons-bottom">
    <i class="fas fa-car"></i>
    <i class="fas fa-car-side"></i>
    <i class="fas fa-circle"></i>
    <i class="fas fa-circle"></i>
  </div>

  <hr>

  <!-- Footer fixado no fim da tela -->
  <footer>
    Z&L CARS — Desde 2026<br>
    Desenvolvido por Matheus Ledo
  </footer>
</body>
</html>
